<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prohozy</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

.container{
width:90%;
max-width:700px;
}

h1{
font-size:clamp(28px,5vw,40px);
margin-bottom:30px;
}

input{
width:100%;
padding:20px;
font-size:clamp(26px,6vw,40px);
text-align:center;
border-radius:10px;
border:none;
margin-bottom:30px;
}

#result{
font-size:clamp(20px,4vw,28px);
}

.box{
border:1px solid #444;
padding:20px;
margin:15px 0;
border-radius:10px;
background:#1b1b1b;
}

.notfound{
margin-top:30px;
color:#ff6b6b;
font-size:clamp(20px,4vw,26px);
}
  </style>
</head>

<body>
<div class="container">

<h1>Vyhledání směny</h1>

<input id="shiftInput" placeholder="číslo směny">

<div id="result"></div>

</div>
<script>

let shifts = {}

fetch("https://docs.google.com/spreadsheets/d/1-AKoAdLP2HceuipD6Cakb225Y2nF90ANW1ZhvyfTQoc/gviz/tq?tqx=out:json")
.then(res => res.text())
.then(text => {

let json = JSON.parse(text.substring(47).slice(0,-2))
let rows = json.table.rows

rows.forEach(row => {

let id = row.c[0]?.v
let txt = row.c[1]?.v

if(id){

if(!shifts[id]){
shifts[id] = []
}

if(txt){
shifts[id].push(txt)
}

}

})

})

document.getElementById("shiftInput").addEventListener("input", function(){

let value = this.value
let result = document.getElementById("result")

if(value === ""){
result.innerHTML = ""
return
}

if(shifts[value]){

result.innerHTML = shifts[value]
.map(t => `<div class="box">${t}</div>`)
.join("")

}else{

result.innerHTML = `<div class="notfound">Tady zatím nic nemáme :(</div>`

}

})

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
}
</script>
</body>
</html>
