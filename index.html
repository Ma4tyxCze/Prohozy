<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prohozy">

<link rel="apple-touch-icon" href="https://i.imgur.com/LZsTnwU.png">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Prohozy</title>

<link rel="icon" href="https://i.imgur.com/LZsTnwU.png">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.logo{
width:100%;
max-width:600px;
margin:auto;
display:block;
filter: drop-shadow(0 0 18px #FFD400);
}

.appTitle{
color:#FFD400;
font-size:56px;
margin-bottom:20px;
}

.topBar{
display:flex;
gap:12px;
margin-bottom:25px;
}

#gvdSelect{
flex:1;
width:50%;
background:#FFD400;
color:black;
border:none;
padding:18px;
font-size:20px;
border-radius:12px;
font-weight:bold;
height:60px;
}
.addBtn{
flex:1;
width:50%;
background:#FFD400;
color:black;
border:none;
padding:18px;
font-size:20px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
height:60px;
display:flex;
align-items:center;
justify-content:center;
}
input{
width:100%;
padding:20px;
font-size:40px;
text-align:center;
border-radius:14px;
border:none;
margin:30px 0;
}

.box{
border:1px solid #444;
padding:18px;
margin:15px 0;
border-radius:12px;
background:#1b1b1b;
font-size:20px;
line-height:1.4;
min-height:70px;
display:flex;
align-items:center;
}

.notfound{
color:#ff6b6b;
margin-top:20px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#1b1b1b;
width:90%;
max-width:500px;
padding:30px;
}

textarea{
width:100%;
min-height:120px;
font-size:20px;
padding:10px;
}

button{
background:#FFD400;
color:black;
border:none;
padding:12px 20px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#loginScreen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
}

.userBar{
display:flex;
gap:10px;
margin-bottom:15px;
justify-content:center;
align-items:center;
}
.userBox{
background:#1b1b1b;
border:1px solid #444;
padding:12px 18px;
border-radius:12px;
font-size:14px;
display:flex;
align-items:center;
white-space:nowrap;
}
#installBanner{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#FFD400;
color:black;
padding:14px 18px;
border-radius:12px;
font-weight:bold;
font-size:14px;
z-index:9999;
display:none;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#splashLogo{
width:180px;
filter: drop-shadow(0 0 25px #FFD400);
animation:logoPulse 1.6s infinite;
}

@keyframes logoPulse{
0%{
transform:scale(0.95);
opacity:0.7;
filter: drop-shadow(0 0 10px #FFD400);
}
50%{
transform:scale(1);
opacity:1;
filter: drop-shadow(0 0 30px #FFD400);
}
100%{
transform:scale(0.95);
opacity:0.7;
filter: drop-shadow(0 0 10px #FFD400);
}
}  
</style>
</head>

<body>
<div id="splash">
  <img src="https://i.imgur.com/uHurObD.png" id="splashLogo">
</div>
  <div id="installBanner">
Přidej <b>Prohozy</b> na plochu 📱<br>
Klikni <b>Sdílet</b> → <b>Přidat na plochu</b>
</div>
<div id="loginScreen">

<h2>Zadej email:</h2>

<input id="loginEmail" placeholder="email">

<button onclick="login()">Pokračovat</button>

</div>

<div class="container">

<img src="https://i.imgur.com/uHurObD.png" class="logo">

<h1 class="appTitle">Prohozy</h1>

<div class="userBar">
<div class="userBox" id="userInfo"></div>
<button onclick="logout()">Odhlásit</button>
</div>

<div class="topBar">

<select id="gvdSelect">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
</select>

<button onclick="openPopup()" class="addBtn">
Přidat prohoz
</button>

</div>

<h2>Vyhledání směny</h2>

<input 
id="shiftInput"
placeholder="číslo směny"
maxlength="3"
inputmode="numeric"
pattern="[0-9]*"
autocomplete="off"
>

<div id="result"></div>

</div>

<div id="popup" class="popup">

<div class="popupBox">

<h2>Přidat prohoz</h2>

<select id="formGvd">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
</select>

<input id="formShift" placeholder="Směna">

<textarea id="formText" placeholder="Text prohozu"></textarea>

<button onclick="sendProhoz()">Odeslat</button>
<button onclick="closePopup()">Zrušit</button>

</div>

</div>

<script>

let userEmail = localStorage.getItem("prohozy_user")
let shifts=[]
let selectedSheet="432"

const input=document.getElementById("shiftInput")
const result=document.getElementById("result")
const gvdSelect=document.getElementById("gvdSelect")

window.onload=function(){

if(!userEmail){

document.getElementById("loginScreen").style.display="flex"
document.querySelector(".container").style.display="none"
return

}

startApp()

}

function startApp(){

document.getElementById("loginScreen").style.display="none"
document.querySelector(".container").style.display="block"

document.getElementById("userInfo").innerText=
"Přihlášen: "+userEmail
setTimeout(()=>{
input.focus()
},300)
showInstallBanner()
  document.getElementById("installBanner").onclick = function(){

this.style.display="none"
localStorage.setItem("prohozy_install_hint","1")

}
}

async function login(){

let email=document.getElementById("loginEmail").value.trim().toLowerCase()

const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+email)

const data=await res.json()

if(data.allowed){

localStorage.setItem("prohozy_user",email)

userEmail=email

startApp()

}else{

alert("Nemáte přístup")

}

}

gvdSelect.addEventListener("change",function(){

selectedSheet=this.value
input.value=""
result.innerHTML=""

})

input.addEventListener("input",function(){

this.value = this.value.replace(/[^0-9]/g,'')

let value=this.value.trim()

if(value.length!==3){
result.innerHTML=""
return
}

findShift(value)

})

async function findShift(smena){

const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/find?gvd="+selectedSheet+"&smena="+smena)

const data=await res.json()

if(!data.found){

result.innerHTML="<div class='notfound'>Tady zatím prohoz nikdo neposlal :(</div>"
return

}

let html=""

data.data.forEach(row=>{

html+="<div class='box' onclick='copyText(this)'>"+row[1]+"</div>"

})

result.innerHTML=html

}

function openPopup(){

document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

async function sendProhoz(){

const smena=document.getElementById("formShift").value
const text=document.getElementById("formText").value
const gvd=document.getElementById("formGvd").value

await fetch("https://prohozy-api.marty-protiva.workers.dev/api/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
gvd:gvd,
smena:smena,
text:text,
email:userEmail
})

})

alert("Prohoz odeslán")

closePopup()

}

function copyText(el){

navigator.clipboard.writeText(el.innerText)

alert("Text zkopírován")

}

function logout(){

localStorage.removeItem("prohozy_user")
location.reload()

}
function isStandalone(){
return window.matchMedia('(display-mode: standalone)').matches
|| window.navigator.standalone
}

function showInstallBanner(){

if(!isStandalone()){

if(!localStorage.getItem("prohozy_install_hint")){

setTimeout(function(){

document.getElementById("installBanner").style.display="block"

},2000)

localStorage.setItem("prohozy_install_hint","1")

}

}

}

  window.addEventListener("load", function(){

const splash = document.getElementById("splash")

setTimeout(function(){

splash.style.opacity="0"
splash.style.transition="opacity 0.6s"

setTimeout(function(){
splash.remove()
},600)

},700)

})
</script>

</body>
</html>
