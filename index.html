<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prohozy</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
text-align:center;
}

*{box-sizing:border-box;}

.logo{
width:300px;
margin-bottom:20px;
}

  #formShift{
width:120px;
font-size:22px;
text-align:center;
}
  
.addBtn{
flex:1;
background:#FFD400;
color:black;
border:none;
padding:12px;
font-size:16px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.container{
width:100%;
max-width:700px;
padding:20px;
margin-top:40px;
}

.lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.lockBox{
background:#1b1b1b;
padding:30px;
border-radius:10px;
width:90%;
max-width:300px;
}

.lockBox input{
width:100%;
padding:14px;
font-size:22px;
text-align:center;
border-radius:8px;
border:none;
margin-top:10px;
}

.lockBox button{
margin-top:15px;
width:100%;
background:#FFD400;
border:none;
padding:12px;
border-radius:8px;
font-weight:bold;
}

.pinError{
color:#ff6b6b;
margin-top:10px;
}

.gvdBox{
width:100%;
display:flex;
gap:10px;
margin-bottom:20px;
}

#gvdSelect{
flex:1;
background:#FFD400;
color:black;
border:none;
padding:12px;
font-size:16px;
border-radius:8px;
font-weight:bold;

appearance:none;
-webkit-appearance:none;
-moz-appearance:none;

background-image:url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 10px center;
background-size:20px;

padding-right:35px;
}
h1{
font-size:clamp(28px,5vw,40px);
margin-bottom:30px;
}

input{
width:100%;
padding:20px;
font-size:clamp(26px,6vw,40px);
text-align:center;
border-radius:10px;
border:none;
margin-bottom:30px;
}

#result{
font-size:clamp(20px,4vw,28px);
}

.box{
border:1px solid #444;
padding:20px;
margin:15px 0;
border-radius:10px;
background:#1b1b1b;
word-break:break-word;
}

.notfound{
margin-top:30px;
color:#ff6b6b;
font-size:clamp(20px,4vw,26px);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}
.appTitle{
color:#FFD400;
font-size:clamp(32px,6vw,48px);
margin-bottom:10px;
}
  
.popupBox textarea{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:8px;
min-height:120px;
font-size:16px;
}
.popupBox select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#FFD400;
color:black;
font-weight:bold;
}
.popupBox input,
.popupBox textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
}

.popupBox button{
background:#FFD400;
border:none;
padding:10px 16px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div id="lockScreen" class="lockScreen">
<div class="lockBox">

<h2>Zadej přístupový kód</h2>

<input id="pinInput"
type="password"
inputmode="numeric"
maxlength="6"
placeholder="••••••"
autocomplete="off">

<button onclick="checkPin()">Odemknout</button>

<div id="pinError" class="pinError"></div>

</div>
</div>

<div class="container">
<img src="icon.png" class="logo">
<h1 class="appTitle">Prohozy</h1>
<div class="gvdBox">

<select id="gvdSelect">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
</select>

<button onclick="openPopup()" class="addBtn">
Přidat prohoz
</button>

</div>

<h1>Vyhledání směny</h1>

<input id="shiftInput" placeholder="číslo směny" inputmode="numeric" maxlength="3" autocomplete="off">

<div id="result"></div>

</div>

<script>

const correctPin = "112200"

// kontrola při načtení stránky
window.addEventListener("load", () => {

const saved = localStorage.getItem("prohozy_unlock")

if(saved){

const time = parseInt(saved)

if(Date.now() - time < 86400000){
document.getElementById("lockScreen").style.display="none"
}else{
setTimeout(()=>document.getElementById("pinInput").focus(),300)
}

}else{
setTimeout(()=>document.getElementById("pinInput").focus(),300)
}

})

// kontrola PINu
function checkPin(){

const pin = document.getElementById("pinInput").value

if(pin === correctPin){

localStorage.setItem("prohozy_unlock", Date.now())
document.getElementById("lockScreen").style.display="none"

}else{

document.getElementById("pinError").innerText="Špatný kód"
navigator.vibrate?.([100,100])
document.getElementById("pinInput").value=""

}

}

// automatická kontrola po 6 číslech
document.getElementById("pinInput").addEventListener("input",function(){
if(this.value.length === 6){
checkPin()
}
})

function openPopup(){

document.getElementById("popup").style.display="flex"

document.getElementById("formShift").value =
document.getElementById("shiftInput").value

}

function closePopup(){
document.getElementById("popup").style.display="none"
}

async function sendProhoz(){

const smena = document.getElementById("formShift").value
const text = document.getElementById("formText").value
const gvd = document.getElementById("formGvd").value

await fetch("https://script.google.com/macros/s/AKfycbz3x5cZkhzIB7n4qqVQ0MIJ0LFftol6hcCuI07W4TUZKll-KZvGK_InJAaiJ9SkTd3r5Q/exec",{
method:"POST",
body:JSON.stringify({
smena:smena,
text:text,
gvd:gvd
})
})

alert("Prohoz odeslán")
closePopup()

}

const input = document.getElementById("shiftInput")
const result = document.getElementById("result")
const gvdSelect = document.getElementById("gvdSelect")

let selectedSheet = "432"
let shifts = {}

function loadData(){

shifts = {}
result.innerHTML = ""

fetch(`https://docs.google.com/spreadsheets/d/1-AKoAdLP2HceuipD6Cakb225Y2nF90ANW1ZhvyfTQoc/gviz/tq?tqx=out:json&sheet=${selectedSheet}`)
.then(res=>res.text())
.then(text=>{

let json = JSON.parse(text.substring(47).slice(0,-2))
let rows = json.table.rows

rows.forEach(row=>{

let id = row.c[0]?.v
let txt = row.c[1]?.v

if(id){

if(!shifts[id]){shifts[id]=[]}
shifts[id].push(txt||"")

}

})

})

}

// změna GVD
gvdSelect.addEventListener("change",function(){

selectedSheet=this.value

input.value=""
result.innerHTML=""

loadData()

setTimeout(()=>{

input.focus()

input.scrollIntoView({
behavior:"smooth",
block:"center"
})

},100)

})

// první načtení
loadData()

// vyhledávání
input.addEventListener("input",handleInput)

function handleInput(){

let value=input.value.replace(/\D/g,'').trim()
input.value=value

if(value.length!==3){
result.innerHTML=""
return
}

if(!shifts[value]){

navigator.vibrate?.([80,80,80])

result.innerHTML=`<div class="notfound">Taková směna tu není :(</div>`

setTimeout(()=>{
input.focus()
input.select()
},2000)

return
}

let texts=shifts[value].filter(t=>t&&t.trim()!=="")

if(texts.length>0){

navigator.vibrate?.(200)

result.innerHTML=texts
.map(t=>`<div class="box">${t}</div>`)
.join("")

result.scrollIntoView({
behavior:"smooth",
block:"center"
})

}else{

result.innerHTML=`<div class="notfound">Tady zatím prohoz nikdo neposlal :(</div>`

result.scrollIntoView({
behavior:"smooth",
block:"center"
})

}

setTimeout(()=>{
input.focus()
input.click()
},100)

}

input.addEventListener("focus",()=>{input.select()})

</script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js?v=33")
}
</script>

<div id="popup" class="popup">

<div class="popupBox">

<h2>Přidat prohoz</h2>
<select id="formGvd">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
</select>
<input id="formShift"
placeholder="Směna"
inputmode="numeric"
maxlength="3">
<textarea id="formText" placeholder="Text prohozu"></textarea>

<button onclick="sendProhoz()">Odeslat</button>
<button onclick="closePopup()">Zrušit</button>

</div>
</div>

</body>
</html>
