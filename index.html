<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prohozy – nová adresa</title>

  <style>
    body{
      margin:0;
      background:#111;
      color:white;
      font-family:Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
      padding:20px;
    }

    .box{
      max-width:450px;
    }

    h1{
      color:#ffd000;
      margin-bottom:20px;
    }

    p{
      line-height:1.6;
      margin-bottom:18px;
    }

    a{
      display:inline-block;
      padding:14px 24px;
      background:#ffd000;
      color:black;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      font-size:18px;
    }

    a:hover{
      opacity:0.9;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Prohozy byly přesunuty</h1>

  <p>
    Aplikace nyní běží na nové zabezpečené adrese:
  </p>

  <a href="https://www.prohozy.sbs">
    Otevřít Prohozy
  </a>

  <p style="margin-top:25px;font-size:14px;color:#aaa;">
    Pokud si nevíte rady, víte komu napsat :)
  </p>
</div>

</body>
</html>
