<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prohozy</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}
input{
padding:10px;
font-size:18px;
}
button{
padding:10px;
font-size:18px;
}
</style>
</head>

<body>

<h1 style="color:#FFD400">Prohozy</h1>

<input id="email" placeholder="email">
<button onclick="login()">Login</button>

<div id="result"></div>

<script>

async function login(){

let email=document.getElementById("email").value

const res = await fetch("https://prohozy.sbs/api/check?email="+email)

const data = await res.json()

if(data.allowed){

document.getElementById("result").innerHTML="Login OK"

}else{

document.getElementById("result").innerHTML="Nemáte přístup"

}

}

</script>

</body>
</html>
