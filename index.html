<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prohozy</title>
<style>
body{
font-family: Arial;
background:#111;
color:white;
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
text-align:center;
}
*{
box-sizing:border-box;
}
.logo{
width:120px;
margin-bottom:20px;
}

  .title{
color:#FFD400;
}
  
.container{
width:100%;
max-width:700px;
padding:20px;
  margin-top:40px;
}

h1{
font-size:clamp(28px,5vw,40px);
margin-bottom:30px;
}

input{
width:100%;
padding:20px;
font-size:clamp(26px,6vw,40px);
text-align:center;
border-radius:10px;
border:none;
margin-bottom:30px;
}

#result{
font-size:clamp(20px,4vw,28px);
}

.box{
border:1px solid #444;
padding:20px;
margin:15px 0;
border-radius:10px;
background:#1b1b1b;
word-break:break-word;
}

.notfound{
margin-top:30px;
color:#ff6b6b;
font-size:clamp(20px,4vw,26px);
}
  </style>
</head>

<body>
<div class="container">
<img src="icon.png" class="logo">
<h1>Vyhledání směny</h1>

<input id="shiftInput" placeholder="číslo směny" inputmode="numeric" maxlength="3" autocomplete="off">
<div id="result"></div>

</div>
<script>

const input = document.getElementById("shiftInput")
const result = document.getElementById("result")

// autofocus na mobilu
if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
  window.addEventListener("load", () => {
    setTimeout(() => input.focus(), 300)
  })
}

let shifts = {}

// načtení Google Sheet
fetch("https://docs.google.com/spreadsheets/d/1-AKoAdLP2HceuipD6Cakb225Y2nF90ANW1ZhvyfTQoc/gviz/tq?tqx=out:json")
.then(res => res.text())
.then(text => {

let json = JSON.parse(text.substring(47).slice(0,-2))
let rows = json.table.rows

rows.forEach(row => {

let id = row.c[0]?.v
let txt = row.c[1]?.v

if(id){

if(!shifts[id]){
shifts[id] = []
}

shifts[id].push(txt || "")

}

})

})

// event listener
input.addEventListener("input", handleInput)

function handleInput(){

let value = input.value.replace(/\D/g,'').trim()
input.value = value

if(value.length !== 3){
result.innerHTML = ""
return
}

// směna neexistuje
if(!shifts[value]){

navigator.vibrate?.([80,80,80])

result.innerHTML = `<div class="notfound">Taková směna tu není :(</div>`

input.blur()

setTimeout(() => {
input.focus()
input.select()
}, 2000)

return
}

// směna existuje
let texts = shifts[value].filter(t => t && t.trim() !== "")

if(texts.length > 0){

navigator.vibrate?.(200)

result.innerHTML = texts
.map(t => `<div class="box">${t}</div>`)
.join("")

}else{

result.innerHTML = `<div class="notfound">Tady zatím prohoz nikdo neposlal :(</div>`

}

input.blur()

setTimeout(() => {
input.focus()
input.select()
}, 1000)

}

// označení textu při kliknutí
input.addEventListener("focus", () => {
input.select()
})

</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js?v=16")
}
</script>
</body>
</html>
