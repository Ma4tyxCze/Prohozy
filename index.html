<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prohozy</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

h1{
color:#FFD400;
}

input{
padding:10px;
font-size:18px;
margin:10px;
}

button{
padding:10px 15px;
font-size:18px;
}
</style>
</head>

<body>

<h1>Prohozy</h1>

<input id="email" placeholder="email">
<button onclick="login()">Login</button>

<br><br>

<input id="shift" placeholder="směna">
<button onclick="find()">Najít</button>

<div id="result"></div>

<script>

async function login(){

let email=document.getElementById("email").value

const res = await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+email)

const data = await res.json()

if(data.allowed){

document.getElementById("result").innerHTML="Přihlášen ✔"

}else{

document.getElementById("result").innerHTML="Nemáte přístup"

}

}

async function find(){

let smena=document.getElementById("shift").value

const res = await fetch("https://prohozy-api.marty-protiva.workers.dev/api/find?gvd=432&smena="+smena)

const data = await res.json()

if(!data.found){

document.getElementById("result").innerHTML="Nic nenalezeno"

return
}

let html=""

data.data.forEach(row=>{
html += "<div>"+row[1]+"</div>"
})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
