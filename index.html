<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Prohozy</title>

<link rel="manifest" href="/Prohozy/manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="/Prohozy/icons/icon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/Prohozy/icons/icon_16.png">

<link rel="apple-touch-icon" sizes="180x180" href="/Prohozy/icons/icon_ios_180v2.png?v=5">

<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Prohozy">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

/* SPLASH */

#iosFix{
  position:fixed;
  inset:0;
  background:#111;
  z-index:9997;
}

#splash{
  position:fixed;
  inset:0;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#splashCircle{
  width:200px;
  height:200px;
  border-radius:50%;
  overflow:hidden;
  background:url("/Prohozy/icons/uvod.png") center/145% no-repeat;
  box-shadow:0 0 50px rgba(255,180,0,0.7);
  animation:pulse 1.6s infinite;
}

@keyframes pulse{
  0%{transform:scale(.95)}
  50%{transform:scale(1)}
  100%{transform:scale(.95)}
}

@keyframes splashOut{
  0%{transform:scale(1); opacity:1;}
  100%{transform:scale(2.4); opacity:0;}
}

.splash-hide #splashCircle{
  animation:splashOut .6s ease forwards;
}

/* APP */

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.logo{
width:100%;
max-width:420px;
margin:auto;
display:block;
filter:drop-shadow(0 0 18px #FFD400);
}

.appTitle{
color:#FFD400;
font-size:56px;
margin:20px 0;
}

.userBar{
display:flex;
gap:10px;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

.userBox{
background:#1b1b1b;
border:1px solid #444;
padding:10px 16px;
border-radius:12px;
white-space:nowrap;
}

button{
background:#FFD400;
color:black;
border:none;
padding:10px 18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.topBar{
display:flex;
gap:12px;
margin-bottom:25px;
}

#gvdSelect{
flex:2;
height:60px;
font-size:20px;
font-weight:bold;
border-radius:14px;
border:none;
background:#FFD400;
color:black;
text-align:center;
}

.addBtn{
flex:1;
height:60px;
font-size:20px;
font-weight:bold;
border-radius:14px;
background:#FFD400;
color:black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#shiftInput{
width:140px;
font-size:36px;
padding:12px;
border-radius:12px;
border:none;
text-align:center;
margin:20px auto;
display:block;
}

#loginEmail{
width:260px;
padding:12px;
font-size:18px;
border-radius:12px;
border:none;
margin:10px auto;
display:block;
}

.box{
border:1px solid #444;
padding:16px;
margin:12px 0;
border-radius:12px;
background:#1b1b1b;
font-size:18px;
display:flex;
align-items:center;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#1b1b1b;
padding:30px;
width:90%;
max-width:420px;
border-radius:16px;
}

textarea{
width:100%;
min-height:100px;
padding:10px;
border-radius:10px;
border:none;
}

#loginScreen{
position:fixed;
inset:0;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#installBanner{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#FFD400;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
display:none;
}

</style>
</head>

<body>

<div id="iosFix"></div>

<div id="splash">
  <div id="splashCircle"></div>
</div>

<div id="installBanner">Přidej Prohozy na plochu 📱</div>

<div id="loginScreen">
<h2>Zadej email</h2>
<input id="loginEmail" placeholder="email">
<button onclick="login()">Pokračovat</button>
</div>

<div class="container">

<img src="https://i.imgur.com/uHurObD.png" class="logo">

<h1 class="appTitle">Prohozy</h1>

<div class="userBar">
<div class="userBox" id="userInfo"></div>
<button onclick="logout()">Odhlásit</button>
</div>

<div class="topBar">
<select id="gvdSelect">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
<option value="50">Všední den 50</option>
<option value="44">Sobota 44</option>
<option value="45">Neděle 45</option>
</select>

<button class="addBtn" onclick="openPopup()">Přidat prohoz</button>
</div>

<h2>Vyhledání směny</h2>
<input id="shiftInput" maxlength="3" inputmode="numeric" placeholder="000">
<div id="result"></div>

</div>

<div id="popup" class="popup">
<div class="popupBox">
<h2>Přidat prohoz</h2>

<select id="formGvd">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
<option value="50">Všední den 50</option>
<option value="44">Sobota 44</option>
<option value="45">Neděle 45</option>
</select>

<input id="formShift" placeholder="Směna">
<textarea id="formText"></textarea>

<button onclick="sendProhoz(this)">Odeslat</button>
<button onclick="closePopup()">Zrušit</button>

</div>
</div>

<script>

let userEmail = localStorage.getItem("prohozy_user")
let selectedSheet="432"

function hideSplash(){
  document.body.classList.add("splash-hide")
  setTimeout(()=>{
    document.getElementById("splash")?.remove()
  },600)
}

window.onload=async function(){

setTimeout(hideSplash,800)
setTimeout(()=>document.getElementById("iosFix")?.remove(),700)

if(!userEmail){
document.getElementById("loginScreen").style.display="flex"
document.querySelector(".container").style.display="none"
return
}

const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+userEmail)
const data=await res.json()

if(!data.allowed){
localStorage.removeItem("prohozy_user")
location.reload()
return
}

startApp()
}

function startApp(){
document.getElementById("loginScreen").style.display="none"
document.querySelector(".container").style.display="block"
document.getElementById("userInfo").innerText="Přihlášen: "+userEmail
showInstallBanner()
}

function login(){
let email=document.getElementById("loginEmail").value.trim().toLowerCase()
localStorage.setItem("prohozy_user",email)
location.reload()
}

function logout(){
localStorage.removeItem("prohozy_user")
location.reload()
}

function showInstallBanner(){
if(!window.matchMedia('(display-mode: standalone)').matches){
setTimeout(()=>document.getElementById("installBanner").style.display="block",2000)
}
}

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Prohozy/sw.js');
}
</script>

</body>
</html>
