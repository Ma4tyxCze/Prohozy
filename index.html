<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<title>Prohozy</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
margin-top:100px;
}

.notfound{
margin-top:30px;
color:#ff6b6b;
font-size:20px;
}
  
.box{
border:1px solid #444;
padding:15px;
margin:10px;
border-radius:8px;
background:#1b1b1b;
}  
  
input{
padding:15px;
font-size:22px;
width:200px;
text-align:center;
}

#result{
margin-top:40px;
font-size:22px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h1>Zadej směnu</h1>

<input id="shiftInput" placeholder="číslo směny">

<div id="result"></div>

<script>

let shifts = {}

fetch("https://docs.google.com/spreadsheets/d/1-AKoAdLP2HceuipD6Cakb225Y2nF90ANW1ZhvyfTQoc/gviz/tq?tqx=out:json")
.then(res => res.text())
.then(text => {

let json = JSON.parse(text.substring(47).slice(0,-2))
let rows = json.table.rows

rows.forEach(row => {

let id = row.c[0]?.v
let txt = row.c[1]?.v

if(id){

if(!shifts[id]){
shifts[id] = []
}

if(txt){
shifts[id].push(txt)
}

}

})

})

document.getElementById("shiftInput").addEventListener("input", function(){

let value = this.value
let result = document.getElementById("result")

if(value === ""){
result.innerHTML = ""
return
}

if(shifts[value]){

result.innerHTML = shifts[value]
.map(t => `<div class="box">${t}</div>`)
.join("")

}else{

result.innerHTML = `<div class="notfound">Tady zatím nic nemáme :(</div>`

}

})

</script>

</body>
</html>
