<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Prohozy</title>

<link rel="manifest" href="/Prohozy/manifest.json">

<!-- Ikonky -->
<link rel="icon" type="image/png" sizes="32x32" href="/Prohozy/icons/icon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/Prohozy/icons/icon_16.png">
<link rel="apple-touch-icon" href="/Prohozy/icons/icon_180.png">

<!-- PWA -->
<meta name="theme-color" content="#111111">

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prohozy">

</head>
<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.logo{
width:100%;
max-width:420px;
margin:auto;
display:block;
filter:drop-shadow(0 0 18px #FFD400);
}

.appTitle{
color:#FFD400;
font-size:56px;
margin:20px 0;
}

.userBar{
display:flex;
gap:10px;
justify-content:center;
align-items:center;
margin-bottom:20px;
}

.userBox{
background:#1b1b1b;
border:1px solid #444;
padding:10px 16px;
border-radius:12px;
white-space:nowrap;
}

button{
background:#FFD400;
color:black;
border:none;
padding:10px 18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

.topBar{
display:flex;
gap:12px;
margin-bottom:25px;
}

#gvdSelect{
flex:2;
height:60px;
font-size:20px;
font-weight:bold;
border-radius:14px;
border:none;
background:#FFD400;
color:black;
appearance:none;
-webkit-appearance:none;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
text-align-last:center;
}

.addBtn{
flex:1;
height:60px;
font-size:20px;
font-weight:bold;
border-radius:14px;
border:none;
background:#FFD400;
color:black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#shiftInput{
width:140px;
font-size:36px;
padding:12px;
border-radius:12px;
border:none;
text-align:center;
margin:20px auto;
display:block;
}

#loginEmail{
width:260px;
padding:12px;
font-size:18px;
border-radius:12px;
border:none;
margin:10px auto;
display:block;
}

.box{
border:1px solid #444;
padding:16px;
margin:12px 0;
border-radius:12px;
background:#1b1b1b;
font-size:18px;
min-height:60px;
display:flex;
align-items:center;
}

.notfound{
color:#ff6b6b;
margin-top:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#1b1b1b;
padding:30px;
width:90%;
max-width:420px;
border-radius:16px;
}

textarea{
width:100%;
min-height:100px;
padding:10px;
font-size:16px;
border-radius:10px;
border:none;
margin-top:10px;
}

#loginScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#installBanner{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#FFD400;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
display:none;
}

#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

#splashLogo{
width:160px;
filter:drop-shadow(0 0 20px #FFD400);
animation:pulse 1.6s infinite;
}

@keyframes pulse{
0%{transform:scale(.95)}
50%{transform:scale(1)}
100%{transform:scale(.95)}
}

</style>
</head>

<body>

<div id="splash">
<img src="https://i.imgur.com/uHurObD.png" id="splashLogo">
</div>

<div id="installBanner">
Přidej Prohozy na plochu 📱
</div>

<div id="loginScreen">

<h2>Zadej email</h2>

<input id="loginEmail" placeholder="email">

<button onclick="login()">Pokračovat</button>

</div>

<div class="container">

<img src="https://i.imgur.com/uHurObD.png" class="logo">

<h1 class="appTitle">Prohozy</h1>

<div class="userBar">
<div class="userBox" id="userInfo"></div>
<button onclick="logout()">Odhlásit</button>
</div>

<div class="topBar">

<select id="gvdSelect">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
<option value="50">Všední den 50</option>
<option value="44">Sobota 44</option>
<option value="45">Neděle 45</option>
</select>

<button class="addBtn" onclick="openPopup()">Přidat prohoz</button>

</div>

<h2>Vyhledání směny</h2>

<input id="shiftInput" maxlength="3" inputmode="numeric" placeholder="000">

<div id="result"></div>

</div>

<div id="popup" class="popup">

<div class="popupBox">

<h2>Přidat prohoz</h2>

<select id="formGvd" style="width:100%;padding:12px;border-radius:10px">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
<option value="50">Všední den 50</option>
<option value="44">Sobota 44</option>
<option value="45">Neděle 45</option>
</select>

<input id="formShift" placeholder="Směna" maxlength="3" inputmode="numeric" style="width:100%;padding:12px;border-radius:10px;margin-top:10px">

<textarea id="formText" placeholder="Text prohozu"></textarea>

<button onclick="sendProhoz(this)">Odeslat</button>
<button onclick="closePopup()">Zrušit</button>

</div>
</div>

<script>

let userEmail = localStorage.getItem("prohozy_user")
let selectedSheet="432"

const input=document.getElementById("shiftInput")
const result=document.getElementById("result")
const gvdSelect=document.getElementById("gvdSelect")

function hideSplash(){

const splash=document.getElementById("splash")

setTimeout(()=>{

splash.style.opacity="0"
splash.style.transition="opacity .6s"

setTimeout(()=>{
if(splash) splash.remove()
},600)

},700)

}

window.onload=async function(){

hideSplash()

if(!userEmail){

document.getElementById("loginScreen").style.display="flex"
document.querySelector(".container").style.display="none"
return

}

const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+userEmail)
const data=await res.json()

if(!data.allowed){

localStorage.removeItem("prohozy_user")

document.getElementById("loginScreen").style.display="flex"
document.querySelector(".container").style.display="none"

return

}

startApp()

}

function startApp(){

document.getElementById("loginScreen").style.display="none"
document.querySelector(".container").style.display="block"

document.getElementById("userInfo").innerText="Přihlášen: "+userEmail

setTimeout(()=>{input.focus()},300)

showInstallBanner()

document.getElementById("installBanner").onclick=function(){
this.style.display="none"
localStorage.setItem("prohozy_install_hint","1")
}

}

async function login(){

let email=document.getElementById("loginEmail").value.trim().toLowerCase()

const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+email)
const data=await res.json()

if(data.allowed){

localStorage.setItem("prohozy_user",email)
userEmail=email
startApp()

}else{

alert("Nemáte přístup")

}

}

gvdSelect.addEventListener("change",function(){

selectedSheet=this.value
input.value=""
result.innerHTML=""

})

input.addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'')

let value=this.value

if(value.length!==3){
result.innerHTML=""
return
}

this.blur()

findShift(value)

})

async function findShift(smena){

const res = await fetch("https://prohozy-api.marty-protiva.workers.dev/api/find?gvd="+selectedSheet+"&smena="+smena)
const data = await res.json()

if(!data.found){
result.innerHTML="<div class='notfound'>Tady zatím nikdo nic nepřidal</div>"
return
}

let html=""
let valid=false

data.data.forEach(row=>{

let text=row[1]

if(text && text.trim()!==""){
valid=true
html+="<div class='box' onclick='copyText(this)'>"+text+"</div>"
}

})

if(!valid){
result.innerHTML="<div class='notfound'>Tady zatím nikdo nic nepřidal</div>"
return
}

result.innerHTML=html

const firstBox=result.querySelector(".box")

if(firstBox){
firstBox.scrollIntoView({
behavior:"smooth",
block:"center"
})
}

}

async function sendProhoz(btn){

const smena=document.getElementById("formShift").value.trim()
const text=document.getElementById("formText").value.trim()
const gvd=document.getElementById("formGvd").value

if(smena=="" || text==""){
alert("Vyplň směnu a text prohozu")
return
}

btn.disabled=true
btn.innerText="Odesílám..."

await fetch("https://prohozy-api.marty-protiva.workers.dev/api/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
gvd:gvd,
smena:smena,
text:text,
email:userEmail
})

})

alert("Prohoz odeslán")

closePopup()
// vyčištění formuláře
document.getElementById("formShift").value=""
document.getElementById("formText").value=""
document.getElementById("formGvd").value=selectedSheet
btn.disabled=false
btn.innerText="Odeslat"

}

function openPopup(){

document.getElementById("popup").style.display="flex"

// nastaví GVD podle hlavního výběru
document.getElementById("formGvd").value = selectedSheet

// předvyplní směnu
document.getElementById("formShift").value = input.value

}
function closePopup(){
document.getElementById("popup").style.display="none"
}

function copyText(el){

navigator.clipboard.writeText(el.innerText)

showToast("Text zkopírován")

}

function logout(){

localStorage.removeItem("prohozy_user")
location.reload()

}

function showInstallBanner(){

if(!window.matchMedia('(display-mode: standalone)').matches){

if(!localStorage.getItem("prohozy_install_hint")){

setTimeout(()=>{
document.getElementById("installBanner").style.display="block"
},2000)

}

}

}

setTimeout(()=>{
const splash=document.getElementById("splash")
if(splash) splash.remove()
},3000)
function showToast(text){

let toast=document.createElement("div")

toast.innerText=text

toast.style.position="fixed"
toast.style.bottom="40px"
toast.style.left="50%"
toast.style.transform="translateX(-50%)"
toast.style.background="#FFD400"
toast.style.color="black"
toast.style.padding="12px 18px"
toast.style.borderRadius="12px"
toast.style.fontWeight="bold"
toast.style.zIndex="9999"
toast.style.boxShadow="0 0 10px rgba(0,0,0,0.5)"

document.body.appendChild(toast)

setTimeout(()=>{
toast.style.opacity="0"
toast.style.transition="opacity .4s"
},900)

setTimeout(()=>{
toast.remove()
},1300)

}
  
</script>

</body>
</html>
