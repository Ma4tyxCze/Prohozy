<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">

<title>Prohozy</title>

<link rel="manifest" href="/Prohozy/manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="/Prohozy/icons/icon_32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/Prohozy/icons/icon_16.png">

<link rel="apple-touch-icon" href="/Prohozy/icons/icon_ios_180v2.png?v=3">

<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Prohozy">

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
text-align:center;
}

/* 🔥 SPLASH NOVÝ */

#splash{
position:fixed;
inset:0;
background:#111;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
transition: opacity .4s ease;
}

#splashCircle{
  width:200px;          /* 👈 pevná šířka */
  height:200px;         /* 👈 stejná = kruh */
  border-radius:50%;
  overflow:hidden;

  display:flex;         /* 👈 zpět centrování */
  align-items:center;
  justify-content:center;

  box-shadow:0 0 50px rgba(255,180,0,0.7);
  animation:pulse 1.6s infinite;
}

#splashImg{
  width:158%;
  margin-top:15px;   /* 👈 TADY LADÍŠ */
}

@keyframes pulse{
0%{transform:scale(.95)}
50%{transform:scale(1)}
100%{transform:scale(.95)}
}

@keyframes splashOut{
0%{transform:scale(1); opacity:1;}
100%{transform:scale(2.4); opacity:0;}
}

.splash-hide #splashCircle{
  animation:none;
  opacity:0;
  transition:opacity .4s ease;
}
body.android #splashCircle{
  animation:none;
}
/* APP */

.container{
max-width:800px;
margin:auto;
padding: 0 20px 20px 20px; /* nahoře 0 */
}

.logo{
  width:100%;
  max-width:420px;
  margin: 0 auto -60px auto; /* 👈 KLÍČ */
  display:block;
  filter:drop-shadow(0 0 18px #FFD400);
}

.appTitle{
  color:#FFD400;
  font-size:56px;
  margin: 0 0 10px 0; /* nahoře 0, dole malá mezera */
  line-height:1.1;
}

.userBar{
display:flex;
gap:10px;
justify-content:space-between;   /* 👈 místo center */
align-items:center;
margin-bottom:20px;

width:100%;                      /* 👈 důležité */
max-width:100%;                  /* 👈 ochrana */
}
.userBar > *{
  height:44px;           /* 👈 tady má být výška */
  box-sizing:border-box;
}
.userBox{
  background:#1b1b1b;
  border:1px solid #444;
  padding:0 16px;
  border-radius:12px;

  display:flex;
  align-items:center;

  max-width:70%;        /* 👈 zabrání přetékání */
  overflow:hidden;      /* 👈 skryje přebytek */
  text-overflow:ellipsis; /* 👈 ... */
  white-space:nowrap;
  font-size: clamp(12px, 4vw, 16px);  /* 👈 automatické zmenšování */

}

button{
background:#FFD400;
color:black;
border:none;
padding:10px 18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}
.userBar button{
  padding:0 18px;        /* 👈 změna */
  font-size:18px;
  display:flex;
  align-items:center;
}
.topBar{
display:flex;
gap:12px;
margin-bottom:25px;
}

#gvdSelect{
flex:2;
height:60px;
font-size:20px;
font-weight:bold;
border-radius:14px;
border:none;
background:#FFD400;
color:black;
text-align:center;
text-align-last:center;
}

.addBtn{
flex:1;
height:60px;
font-size:20px;
font-weight:bold;
border-radius:14px;
background:#FFD400;
color:black;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

#shiftInput{
width:140px;
font-size:36px;
padding:12px;
border-radius:12px;
border:none;
text-align:center;
margin:20px auto;
display:block;
}

#loginEmail{
  width:260px;
  padding:12px;
  font-size:18px;
  border-radius:12px;
  border:none;
  margin:10px auto;
  display:block;
}

.box{
border:1px solid #444;
padding:16px;
margin:12px 0;
border-radius:12px;
background:#1b1b1b;
font-size:18px;
min-height:60px;
display:flex;
align-items:center;
}

.notfound{
color:#ff6b6b;
margin-top:10px;
}

.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;

/* 🔥 KLÍČ */
padding:16px;
box-sizing:border-box;
}

.popupBox{
background:#1b1b1b;
padding:20px;
width:100%;
max-width:420px;  /* 🔥 důležité */
border-radius:16px;

display:flex;
flex-direction:column;
gap:14px;
}

textarea{
  width:100%;
  min-height:80px;
  padding:10px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;  /* 🔥 důležité */
}

#loginScreen{
position:fixed;
inset:0;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#installBanner{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#FFD400;
color:black;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
display:none;
}
.formRow{
  display:flex;
  gap:10px;
}

#formGvd{
  flex:1;                 /* 👈 zabere zbytek místa */
  min-width:0;            /* 👈 dovolí zmenšení */
  height:55px;
  font-size:16px;         /* 👈 trochu menší text */
  border-radius:12px;
  border:none;

  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
#formShift{
  width:90px;        /* 👈 menší pole */
  flex:0 0 90px;     /* 👈 fixní šířka */
  height:55px;
  font-size:18px;
  border-radius:12px;
  border:none;
  text-align:center;
}
  .popupButtons{
  display:flex;
  flex-direction:column;
  gap:10px;
  align-items:stretch;   /* 👈 důležité */
}

.popupButtons button{
  width:100%;            /* 👈 stejné tlačítko */
  height:48px;           /* 👈 hezčí výška */
  font-size:18px;
}
body.loading #loginScreen,
body.loading .container{
  display:none !important;
}
/* TICKER */

#tickerWrapper{
  width:100%;
  overflow:hidden;
  margin: 5px 0 5px 0;
  height:44px;

  display:none; /* default skrytý */
}
  #tickerWrapper,
#tickerText,
#tickerContent{
  -webkit-user-select: none;   /* iOS Safari */
  user-select: none;
  -webkit-touch-callout: none; /* vypne menu "Kopírovat" na iOS */
}
#tickerWrapper:active #tickerText{
  animation-play-state: paused;
}
#tickerIcon{
  height:100%;
  width:auto;
  margin-right:12px;
  image-rendering: pixelated;

  transform: scale(2.2);   /* 👈 zvětšení */
  transform-origin: left center;
  margin-right:50px;   /* 👈 mezera mezi ikonou a textem */
}

  
#tickerText{
  display:inline-flex;
  align-items:center;
  height:100%;              /* 👈 KLÍČ */

  white-space:nowrap;
  color:#FF3B3B;
  font-weight:bold;
  font-size:26px;

  padding-left:100%;
  animation: tickerMove linear infinite;
}
@keyframes tickerMove{
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-100%);
  }
}
</style>
</head>

<body class="loading">
<!-- 🔥 NOVÝ SPLASH -->
<div id="splash">
  <div id="splashCircle">
    <img src="icons/icon_maskable.png" id="splashImg">
  </div>
</div>

<div id="installBanner">
Přidej Prohozy na plochu 📱
</div>

<div id="loginScreen">
<h2>Zadej email</h2>
<input id="loginEmail" placeholder="email">
<button onclick="login()">Pokračovat</button>
</div>

<div class="container">

<img src="https://i.imgur.com/uHurObD.png" class="logo">

  <div id="tickerWrapper">
  <div id="tickerText">
    <img src="icons/ticker-metro.png" id="tickerIcon">
    <span id="tickerContent"></span>
  </div>
</div>
  
<h1 class="appTitle">Prohozy</h1>

<div class="userBar">
<div class="userBox" id="userInfo"></div>
<button onclick="logout()">Odhlásit</button>
</div>

<div class="topBar">
<select id="gvdSelect">
<option value="432">Všední den 432</option>
<option value="441">Sobota 441</option>
<option value="451">Neděle 451</option>
<option value="50">Všední den 50</option>
<option value="44">Sobota 44</option>
<option value="45">Neděle 45</option>
</select>

<button class="addBtn" onclick="openPopup()">Přidat prohoz</button>
</div>

<h2>Vyhledání směny</h2>
<input id="shiftInput" maxlength="3" inputmode="numeric" placeholder="000">
<div id="result"></div>

</div>

<div id="popup" class="popup">
<div class="popupBox">

<h2>Přidat prohoz</h2>

<div class="formRow">
  <select id="formGvd">
    <option value="432">Všední den 432</option>
    <option value="441">Sobota 441</option>
    <option value="451">Neděle 451</option>
    <option value="50">Všední den 50</option>
    <option value="44">Sobota 44</option>
    <option value="45">Neděle 45</option>
  </select>

  <input 
    id="formShift"
    type="tel"
    inputmode="numeric"
    pattern="[0-9]*"
    maxlength="3"
    placeholder="Směna"
    enterkeyhint="done"
  />
</div>

<textarea id="formText"></textarea>
<div class="popupButtons">
  <button onclick="sendProhoz(this)">Odeslat</button>
  <button onclick="closePopup()">Zrušit</button>
</div>

</div>
</div>

<script>

let userEmail = localStorage.getItem("prohozy_user")
let selectedSheet="432"
let savedScrollY = 0
const input=document.getElementById("shiftInput")
const result=document.getElementById("result")
const gvdSelect=document.getElementById("gvdSelect")
// 🔥 označení čísla + posun do středu obrazovky (mobil)
input.addEventListener("focus", function() {
  this.select()

  setTimeout(() => {
    this.scrollIntoView({
      behavior: "smooth",
      block: "center"
    })
  }, 300)
})
function hideSplash(){
  document.body.classList.add("splash-hide")

  setTimeout(()=>{
    document.getElementById("splash")?.remove()
  },500) // musí sedět s CSS
}

window.onload = async function(){

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent)

  if(!isIOS){
    document.getElementById("splash")?.remove()
    document.body.classList.add("android")
  } else {
    setTimeout(hideSplash,800)
  }

  if(!userEmail){
    document.getElementById("loginScreen").style.display="flex"
    document.querySelector(".container").style.display="none"

    document.body.classList.remove("loading")
    return
  }

  const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+userEmail)
  const data=await res.json()

  if(!data.allowed){
    localStorage.removeItem("prohozy_user")
    document.getElementById("loginScreen").style.display="flex"
    document.querySelector(".container").style.display="none"

    document.body.classList.remove("loading")
    return
  }

  startApp()

  document.body.classList.remove("loading")
}

/* zbytek JS NEZMĚNĚNÝ */

function startApp(){
  document.getElementById("loginScreen").style.display="none"
  document.querySelector(".container").style.display="block"
  document.getElementById("userInfo").innerText = userEmail

  loadTicker()
  // 🔥 DEFAULT GVD + VÝJIMKY
const today = new Date()
const day = today.getDay() // 0 = neděle, 6 = sobota

// --- VÝJIMKY NA KONKRÉTNÍ DATA ---

// 30.–31. 3. → 432
if(
  today.getFullYear() === 2026 &&
  today.getMonth() === 2 && // březen
  (today.getDate() === 30 || today.getDate() === 31)
){
  selectedSheet = "432"
}

// 1.–2. 4. → 50
else if(
  today.getFullYear() === 2026 &&
  today.getMonth() === 3 && // duben
  (today.getDate() === 1 || today.getDate() === 2)
){
  selectedSheet = "50"
}

// 3.–4. 4. → 44
else if(
  today.getFullYear() === 2026 &&
  today.getMonth() === 3 &&
  (today.getDate() === 3 || today.getDate() === 4)
){
  selectedSheet = "44"
}

// 5.–6. 4. → 45
else if(
  today.getFullYear() === 2026 &&
  today.getMonth() === 3 &&
  (today.getDate() === 5 || today.getDate() === 6)
){
  selectedSheet = "45"
}

// --- STANDARDNÍ REŽIM ---
else {

  if(day === 6){
    selectedSheet = "441" // sobota
  } else if(day === 0){
    selectedSheet = "451" // neděle
  } else {
    selectedSheet = "432" // všední den
  }

}

  gvdSelect.value = selectedSheet

  
  showInstallBanner()

  document.getElementById("installBanner").onclick=function(){
    this.style.display="none"
    localStorage.setItem("prohozy_install_hint","1")
  }

  // 🔥 STATS – otevření appky
  fetch("https://prohozy-api.marty-protiva.workers.dev/api/stats", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:userEmail,
      akce:"open"
    })
  }).catch(()=>{})
}

async function login(){
let email=document.getElementById("loginEmail").value.trim().toLowerCase()
const res=await fetch("https://prohozy-api.marty-protiva.workers.dev/api/check?email="+email)
const data=await res.json()
if(data.allowed){
localStorage.setItem("prohozy_user",email)
userEmail=email
startApp()
}else{
alert("Nemáte přístup")
}
}

gvdSelect.addEventListener("change",function(){
selectedSheet=this.value
input.value=""
result.innerHTML=""
})

input.addEventListener("input",function(){
this.value=this.value.replace(/[^0-9]/g,'')
let value=this.value
if(value.length!==3){
result.innerHTML=""
return
}
this.blur()
findShift(value)
})

async function findShift(smena){
const res = await fetch("https://prohozy-api.marty-protiva.workers.dev/api/find?gvd="+selectedSheet+"&smena="+smena)
const data = await res.json()

if(!data.found){
result.innerHTML="<div class='notfound'>Tady zatím nikdo nic nepřidal</div>"
return
}

let html=""
let valid=false

data.data.forEach(row=>{
let text=row[1]
if(text && text.trim()!==""){
valid=true
html+="<div class='box' onclick='copyText(this)'>"+text+"</div>"
}
})

if(!valid){
result.innerHTML="<div class='notfound'>Tady zatím nikdo nic nepřidal</div>"
return
}

result.innerHTML=html

const firstBox=result.querySelector(".box")
if(firstBox){
firstBox.scrollIntoView({behavior:"smooth",block:"center"})
}
}

async function sendProhoz(btn){
const smena=document.getElementById("formShift").value.trim()
const text=document.getElementById("formText").value.trim()
const gvd=document.getElementById("formGvd").value

if(smena=="" || text==""){
alert("Vyplň směnu a text prohozu")
return
}

btn.disabled=true
btn.innerText="Odesílám..."

await fetch("https://prohozy-api.marty-protiva.workers.dev/api/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({gvd:gvd,smena:smena,text:text,email:userEmail})
})

fetch("https://prohozy-api.marty-protiva.workers.dev/api/stats", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    email:userEmail,
    akce:"add"
  })
}).catch(()=>{})

// 🔥 1. ALERT (vracíme)
alert("Prohoz odeslán")
// 🔥 2. RESET PO ALERTU (KLÍČ)
document.activeElement.blur()
document.body.style.zoom = "1"

// 🔥 3. zavřít popup
closePopup()

// 🔥 4. vyčistit form
document.getElementById("formShift").value=""
document.getElementById("formText").value=""
document.getElementById("formGvd").value=selectedSheet

btn.disabled=false
btn.innerText="Odeslat"
}

function openPopup(){
  savedScrollY = window.scrollY
  document.getElementById("popup").style.display="flex"

  // 🔥 FREEZE BODY (hlavní fix)
  document.body.style.position = "fixed"
  document.body.style.top = `-${savedScrollY}px`
  document.body.style.left = "0"
  document.body.style.right = "0"

  document.getElementById("formGvd").value = selectedSheet

  const formShift = document.getElementById("formShift")
  const formText = document.getElementById("formText")

  formShift.value = input.value

 
  formShift.addEventListener("input", () => {
    formShift.value = formShift.value.replace(/[^0-9]/g, "").slice(0, 3);

    if (formShift.value.length === 3) {
      formShift.blur()

      setTimeout(() => {
        formText.focus({ preventScroll: true })
      }, 100)
    }
  }, { once: true })
}
function closePopup(){

  // zrušit focus
  document.activeElement.blur()

  // zavřít popup
  document.getElementById("popup").style.display="none"

  // UNFREEZE BODY
  document.body.style.position = ""
  document.body.style.top = ""
  document.body.style.left = ""
  document.body.style.right = ""

  // vrátit scroll
  window.scrollTo(0, savedScrollY)
  
}
  // 🔥 zavření popupu kliknutím mimo okno
document.getElementById("popup").addEventListener("click", function(e) {
  if (e.target === this) {
    closePopup();
  }
});
function copyText(el){
navigator.clipboard.writeText(el.innerText)
showToast("Text zkopírován")
}

function logout(){
localStorage.removeItem("prohozy_user")
location.reload()
}

function showInstallBanner(){
if(!window.matchMedia('(display-mode: standalone)').matches){
if(!localStorage.getItem("prohozy_install_hint")){
setTimeout(()=>{document.getElementById("installBanner").style.display="block"},2000)
}
}
}

function showToast(text){
let toast=document.createElement("div")
toast.innerText=text
toast.style.position="fixed"
toast.style.bottom="40px"
toast.style.left="50%"
toast.style.transform="translateX(-50%)"
toast.style.background="#FFD400"
toast.style.color="black"
toast.style.padding="12px 18px"
toast.style.borderRadius="12px"
toast.style.fontWeight="bold"
toast.style.zIndex="9999"
toast.style.boxShadow="0 0 10px rgba(0,0,0,0.5)"
document.body.appendChild(toast)
setTimeout(()=>{toast.style.opacity="0";toast.style.transition="opacity .4s"},900)
setTimeout(()=>{toast.remove()},1300)
}
async function loadTicker(){

  try{

    const res = await fetch(
      "https://prohozy-api.marty-protiva.workers.dev/api/ticker"
    )

    const data = await res.json()

    const wrapper =
      document.getElementById("tickerWrapper")

    const textElement =
      document.getElementById("tickerText")

    if(!Array.isArray(data) || data.length === 0){

      wrapper.style.display = "none"
      return

    }

    const dnes = new Date()
    dnes.setHours(0,0,0,0)

    let aktivniTexty = []

    data.forEach(item => {

      if(!item.text || !item.od || !item.do) return

      const od = new Date(item.od)
      const doData = new Date(item.do)

      od.setHours(0,0,0,0)
      doData.setHours(23,59,59,999)

      if(dnes >= od && dnes <= doData){

        aktivniTexty.push(
          item.text.trim()
        )

      }

    })

    if(aktivniTexty.length > 0){

  document.getElementById("tickerContent").innerText =
  aktivniTexty.join("   •   ")

  wrapper.style.display = "block"

  // 🔥 stabilní rychlost tickeru podle skutečné šířky

  requestAnimationFrame(() => {

    const textWidth =
      textElement.scrollWidth

    const screenWidth =
      wrapper.offsetWidth

    const distance =
      textWidth + screenWidth

    const speed = 220   // můžeš měnit

    const duration =
      distance / speed

    textElement.style.animationDuration =
      duration + "s"

  })

}else{

      wrapper.style.display = "none"

    }

  }catch(e){

    console.log("ticker error")

    document.getElementById("tickerWrapper")
      .style.display = "none"

  }

}
  // 🔥 PAUZA TICKERU NA DOTYK (iOS + Android + desktop)

const ticker = document.getElementById("tickerText")

if (ticker) {

  ticker.addEventListener("touchstart", () => {
    ticker.style.animationPlayState = "paused"
  })

  ticker.addEventListener("touchend", () => {
    ticker.style.animationPlayState = "running"
  })

  ticker.addEventListener("mousedown", () => {
    ticker.style.animationPlayState = "paused"
  })

  ticker.addEventListener("mouseup", () => {
    ticker.style.animationPlayState = "running"
  })

}
</script>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/Prohozy/sw.js');
}
</script>

</body>
</html>
